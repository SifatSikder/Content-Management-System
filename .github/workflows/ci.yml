name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint + typecheck + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cms_app
          POSTGRES_PASSWORD: cms_app
          POSTGRES_DB: cms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cms_app -d cms"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://cms_app:cms_app@localhost:5432/cms
      DATABASE_URL_SYNC: postgresql+psycopg2://cms_app:cms_app@localhost:5432/cms
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret
      APP_ENV: dev

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set Python version
        run: uv python install 3.12

      - name: Install Python deps
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Codespell
        run: uv run codespell

      - name: Mypy
        run: uv run mypy app

      - name: Pytest
        run: uv run pytest

      - name: Export OpenAPI schema
        run: uv run python scripts/export_openapi.py openapi.json

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: openapi.json
          if-no-files-found: error

  frontend:
    name: frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: No-raw-fetch guard
        working-directory: .
        run: bash scripts/check-no-raw-fetch.sh

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
